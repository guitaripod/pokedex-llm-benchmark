<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-top">
        <h1 class="logo">
          <span class="logo-icon">◈</span>
          Pokédex
          <span class="logo-count" id="totalCount">—</span>
        </h1>
        <div class="header-subtitle">DeepSeek-V4-Flash test project built in 40 minutes</div>
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search Pokémon by name or number…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="search-clear" id="searchClear" aria-label="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="type-filters" id="typeFilters"></div>
    </header>

    <main class="main">
      <div class="grid-header">
        <span class="grid-result-count" id="resultCount"></span>
        <div class="grid-actions">
          <button class="btn btn-ghost" id="shuffleBtn" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
            Shuffle
          </button>
          <button class="btn btn-ghost" id="scrollTopBtn" title="Scroll to top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m18 15-6-6-6 6"/></svg>
          </button>
        </div>
      </div>
      <div class="pokemon-grid" id="pokemonGrid">
        <div class="loading-state" id="loadingState">
          <div class="loader"></div>
          <p>Loading Pokédex…</p>
        </div>
      </div>
      <div class="load-more" id="loadMore">
        <button class="btn btn-primary" id="loadMoreBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
          Load More Pokémon
        </button>
      </div>
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-icon">🔍</div>
        <h3>No Pokémon found</h3>
        <p>Try adjusting your search or filters</p>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-content" id="modalContent">
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="modal-body" id="modalBody">
          <div class="modal-loader">
            <div class="loader"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="/app.js?v=2"></script>
</body>
</html>
